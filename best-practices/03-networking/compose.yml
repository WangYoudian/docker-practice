
services:
  app1:
    image: nginx:alpine
    networks:
      - frontend

  app2:
    image: nginx:alpine
    networks:
      - frontend
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: secret
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
