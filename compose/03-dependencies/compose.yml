
services:
  app:
    build: ../02-web-db/app
    ports:
      - "8103:8000"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: secret
      DB_NAME: appdb
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ../02-web-db/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb

volumes:
  pg-data:
